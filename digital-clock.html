<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Courier New', monospace;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .clock-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.2em;
            color: #64b5f6;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display {
            font-size: 3em;
            color: #ffffff;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
        }

        .date-display {
            font-size: 0.9em;
            color: #b3e5fc;
            margin-bottom: 10px;
        }

        .am-pm {
            font-size: 1.2em;
            color: #81c784;
            font-weight: bold;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .add-timezone-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1em;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        select option {
            background: #1e3c72;
            color: white;
        }

        .info {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 20px;
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }

        .setting-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: 0.4s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #81c784;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
        }

        .remove-btn {
            background: rgba(255, 87, 34, 0.6);
            border-color: rgba(255, 87, 34, 0.8);
            padding: 8px 16px;
            font-size: 0.8em;
        }

        .remove-btn:hover {
            background: rgba(255, 87, 34, 0.8);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 2.2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Multi-Timezone Clock</h1>

        <div class="settings-panel">
            <div class="setting-group">
                <label style="color: rgba(255, 255, 255, 0.9);">24-Hour Format:</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="format24h" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="controls">
            <select id="timezoneSelect">
                <option value="">Select timezone to add...</option>
            </select>
            <button onclick="addTimezone()">Add Timezone</button>
            <button onclick="resetToDefault()">Reset to Default</button>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>

        <div class="info">
            <p>💡 Tip: Click "Add Timezone" to add more clocks. Hover over cards for details.</p>
            <p>⏰ Times update in real-time every second</p>
        </div>
    </div>

    <script>
        const timezones = [
            { name: 'New York', tz: 'America/New_York', offset: -5 },
            { name: 'London', tz: 'Europe/London', offset: 0 },
            { name: 'Tokyo', tz: 'Asia/Tokyo', offset: 9 },
            { name: 'Sydney', tz: 'Australia/Sydney', offset: 10 },
            { name: 'Dubai', tz: 'Asia/Dubai', offset: 4 },
            { name: 'Singapore', tz: 'Asia/Singapore', offset: 8 },
            { name: 'Hong Kong', tz: 'Asia/Hong_Kong', offset: 8 },
            { name: 'Bangkok', tz: 'Asia/Bangkok', offset: 7 },
            { name: 'Mumbai', tz: 'Asia/Kolkata', offset: 5.5 },
            { name: 'Cairo', tz: 'Africa/Cairo', offset: 2 },
            { name: 'Paris', tz: 'Europe/Paris', offset: 1 },
            { name: 'Berlin', tz: 'Europe/Berlin', offset: 1 },
            { name: 'Moscow', tz: 'Europe/Moscow', offset: 3 },
            { name: 'Los Angeles', tz: 'America/Los_Angeles', offset: -8 },
            { name: 'Chicago', tz: 'America/Chicago', offset: -6 },
            { name: 'Denver', tz: 'America/Denver', offset: -7 },
            { name: 'Mexico City', tz: 'America/Mexico_City', offset: -6 },
            { name: 'São Paulo', tz: 'America/Sao_Paulo', offset: -3 },
            { name: 'Buenos Aires', tz: 'America/Argentina/Buenos_Aires', offset: -3 },
            { name: 'Istanbul', tz: 'Europe/Istanbul', offset: 3 },
            { name: 'Seoul', tz: 'Asia/Seoul', offset: 9 },
            { name: 'Shanghai', tz: 'Asia/Shanghai', offset: 8 },
            { name: 'Auckland', tz: 'Pacific/Auckland', offset: 12 },
            { name: 'Honolulu', tz: 'Pacific/Honolulu', offset: -10 },
        ];

        let selectedTimezones = [
            'America/New_York',
            'Europe/London',
            'Asia/Tokyo'
        ];

        const format24hCheckbox = document.getElementById('format24h');
        const timezoneSelect = document.getElementById('timezoneSelect');
        const clocksGrid = document.getElementById('clocksGrid');

        // Populate timezone select
        function populateTimezoneSelect() {
            timezoneSelect.innerHTML = '<option value="">Select timezone to add...</option>';
            timezones.forEach(tz => {
                if (!selectedTimezones.includes(tz.tz)) {
                    const option = document.createElement('option');
                    option.value = tz.tz;
                    option.textContent = `${tz.name} (UTC ${tz.offset >= 0 ? '+' : ''}${tz.offset})`;
                    timezoneSelect.appendChild(option);
                }
            });
        }

        // Add timezone
        function addTimezone() {
            const selectedTz = timezoneSelect.value;
            if (selectedTz && !selectedTimezones.includes(selectedTz)) {
                selectedTimezones.push(selectedTz);
                populateTimezoneSelect();
                updateAllClocks();
                localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
            }
        }

        // Remove timezone
        function removeTimezone(tz) {
            selectedTimezones = selectedTimezones.filter(t => t !== tz);
            populateTimezoneSelect();
            updateAllClocks();
            localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
        }

        // Reset to default
        function resetToDefault() {
            selectedTimezones = [
                'America/New_York',
                'Europe/London',
                'Asia/Tokyo'
            ];
            populateTimezoneSelect();
            updateAllClocks();
            localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
        }

        // Format time
        function formatTime(date, format24h) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');

            if (format24h) {
                return `${hours}:${minutes}:${seconds}`;
            } else {
                const hour12 = date.getHours() % 12 || 12;
                const ampm = date.getHours() >= 12 ? 'PM' : 'AM';
                return `${String(hour12).padStart(2, '0')}:${minutes}:${seconds}`;
            }
        }

        // Get timezone name
        function getTimezoneName(tzString) {
            const tz = timezones.find(t => t.tz === tzString);
            return tz ? tz.name : tzString;
        }

        // Get AM/PM
        function getAmPm(date) {
            return date.getHours() >= 12 ? 'PM' : 'AM';
        }

        // Update all clocks
        function updateAllClocks() {
            const format24h = format24hCheckbox.checked;
            clocksGrid.innerHTML = '';

            selectedTimezones.forEach(tz => {
                const date = new Date();
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const parts = formatter.formatToParts(date);
                const tzDate = new Date();
                
                // Create a date object adjusted for the timezone
                const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
                const tzDate2 = new Date(date.toLocaleString('en-US', { timeZone: tz }));

                const timeDisplay = formatTime(tzDate2, format24h);
                const ampm = getAmPm(tzDate2);
                const dateDisplay = tzDate2.toLocaleDateString('en-US', {
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-name">${getTimezoneName(tz)}</div>
                    <div class="date-display">${dateDisplay}</div>
                    <div class="time-display">${timeDisplay}</div>
                    ${!format24h ? `<div class="am-pm">${ampm}</div>` : ''}
                    <button class="remove-btn" onclick="removeTimezone('${tz}')">Remove</button>
                `;
                clocksGrid.appendChild(card);
            });
        }

        // Load saved timezones
        function loadTimezones() {
            const saved = localStorage.getItem('selectedTimezones');
            if (saved) {
                try {
                    selectedTimezones = JSON.parse(saved);
                } catch (e) {
                    console.error('Error loading saved timezones:', e);
                }
            }
        }

        // Initialize
        loadTimezones();
        populateTimezoneSelect();
        updateAllClocks();

        // Update clocks every second
        setInterval(() => {
            updateAllClocks();
        }, 1000);

        // Listen to format toggle
        format24hCheckbox.addEventListener('change', () => {
            updateAllClocks();
        });
    </script>
</body>
</html>
